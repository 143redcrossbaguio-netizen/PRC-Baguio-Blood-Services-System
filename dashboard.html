<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRC Baguio Blood Services System</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: #b30000;
    color: white;
    display: flex;
    flex-direction: column;
    padding: 15px;
}

.sidebar h2 {
    margin: 0 0 20px 0;
}

.sidebar button {
    background: none;
    border: none;
    color: white;
    text-align: left;
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
}

.sidebar button:hover {
    background: #800000;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Topbar */
.topbar {
    background: white;
    padding: 10px 15px;
    border-bottom: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
}

iframe {
    flex: 1;
    border: none;
}

/* Mobile */
.menu-btn {
    display: none;
    cursor: pointer;
}

@media(max-width: 768px) {
    .sidebar {
        position: absolute;
        left: -250px;
        top: 0;
        height: 100%;
        transition: 0.3s;
        z-index: 10;
    }

    .sidebar.show {
        left: 0;
    }

    .menu-btn {
        display: block;
    }
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h2>PRC Baguio</h2>

    <button onclick="loadPage('home.html')">Dashboard</button>
    <button onclick="loadPage('donor-entry.html')">Donor Database</button>
    <button onclick="loadPage('galloner.html')">Galloner</button>
    <button onclick="loadPage('events.html')">Blood Drive Events</button>
    <button onclick="loadPage('releasing.html')">Releasing</button>

    <button onclick="logout()">Logout</button>
</div>

<div class="main">
    <div class="topbar">
        <span class="menu-btn" onclick="toggleMenu()">☰</span>
        <span>PRC Baguio Blood Services System</span>
    </div>

    <iframe id="frame" src="home.html"></iframe>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDk_ZKjamILmKJZh0HvVcpPCtFR29uvfNs",
  authDomain: "prc-baguio-bss.firebaseapp.com",
  databaseURL: "https://prc-baguio-bss-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "prc-baguio-bss",
  storageBucket: "prc-baguio-bss.firebasestorage.app",
  messagingSenderId: "867086763087",
  appId: "1:867086763087:web:c1f09d9a1bce6c4799563a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loadPage = function(page) {
    document.getElementById("frame").src = page;
};

window.logout = function() {
    signOut(auth).then(() => {
        window.location.href = "index.html";
    });
};

window.toggleMenu = function() {
    document.getElementById("sidebar").classList.toggle("show");
};
</script>

</body>
</html>
